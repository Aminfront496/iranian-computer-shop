<!DOCTYPE html>
<html lang="fa-IR" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    <title>Sign In / Sign Up</title>
</head>

<body>
    <!-- login popup -->
    <section class="login-page">
        <div class="login-box">
            <div class="login-page-logo">
                <a href="">
                    <img src="assets/images/page-logo.png" alt="page logo">
                </a>
            </div>
            <form action="" class="login-form">
                <h3>ورود / عضویت</h3>
                <div class="get-phone-box">
                    <label for="tel-input">شماره موبایل خود را وارد نمایید :</label>
                    <div class="input-box">
                        <input type="tel" id="tel-input" inputmode="tel" pattern="[0-9]{10,11}" required>
                        <i class="ri-user-add-line"></i>
                    </div>
                </div>
                <button class="login-btn">ورود / عضویت</button>
            </form>
            <div class="info-terms-box">
                <p class="terms-text">با ورود و یا ثبت نام در سایت، شما
                    <span style="color: #0071e3; border-bottom: 1px solid #0071e3;"><a href="">شرایط و قوانین</a></span>
                    استفاده از سرویس های سایت و
                    <span style="font-weight: 500;">قوانین حریم خصوصی</span>
                    آن را
                    می‌پذیرید.
                </p>
            </div>
        </div>
    </section>
</body>

</html>
